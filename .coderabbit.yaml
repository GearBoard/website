language: "th"

reviews:
  profile: "assertive"
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: ["main", "develop"]
  path_filters:
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/node_modules/**"
